<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>檢查報告</title>
<!-- 單檔可攜:全部 CSS / JS 內嵌,不依賴任何 CDN → 可離線開啟、可列印 / 存 PDF。
     字型走 Google Fonts(有網路才美化,離線自動退回系統字,不影響可讀)。 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<!-- 開畫前套用儲存的主題,避免閃白 (FOUC) -->
<script>(function(){try{if(localStorage.getItem('cr-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<style>
  :root{
    --bg:#eef2f6; --surface:#ffffff; --surface-2:#f6f8fa; --text:#1f2937; --head:#0f172a;
    --muted:#64748b; --faint:#94a3b8; --line:#e5e9ef; --line-2:#d3dae3;
    --shadow:0 1px 2px rgba(15,23,42,.06),0 1px 3px rgba(15,23,42,.04);
    --accent:#1e293b; --accent-ink:#ffffff;
    --pass-bg:#d1fae5; --pass-fg:#047857; --pass-dot:#10b981;
    --fail-bg:#ffe2e5; --fail-fg:#be123c; --fail-dot:#f43f5e;
    --warn-bg:#fef3c7; --warn-fg:#b45309; --warn-dot:#f59e0b;
    --na-bg:#eef2f6;   --na-fg:#64748b;   --na-dot:#94a3b8;
    --info-bg:#e0f2fe; --info-fg:#0369a1; --info-dot:#0ea5e9;
    --ring-track:#e2e8f0;
    --fix-bg:#fffbeb; --fix-border:#fde68a; --fix-fg:#b45309;
    --from-bg:#fee2e2; --from-fg:#b91c1c; --to-bg:#dcfce7; --to-fg:#15803d;
    --sev-critical:#e11d48; --sev-high:#f97316; --sev-medium:#f59e0b; --sev-low:#cbd5e1; --sev-info:#38bdf8;
    color-scheme:light;
  }
  html[data-theme="dark"]{
    --bg:#0b1120; --surface:#161e2e; --surface-2:#1f2937; --text:#e2e8f0; --head:#f8fafc;
    --muted:#94a3b8; --faint:#64748b; --line:#2a3547; --line-2:#3a4658;
    --shadow:0 1px 2px rgba(0,0,0,.4);
    --accent:#e2e8f0; --accent-ink:#0b1120;
    --pass-bg:rgba(16,185,129,.16); --pass-fg:#6ee7b7;
    --fail-bg:rgba(244,63,94,.16); --fail-fg:#fda4af;
    --warn-bg:rgba(245,158,11,.16); --warn-fg:#fcd34d;
    --na-bg:rgba(148,163,184,.16); --na-fg:#cbd5e1;
    --info-bg:rgba(14,165,233,.16); --info-fg:#7dd3fc;
    --ring-track:#2a3547;
    --fix-bg:rgba(245,158,11,.1); --fix-border:rgba(245,158,11,.35); --fix-fg:#fcd34d;
    --from-bg:rgba(244,63,94,.15); --from-fg:#fda4af; --to-bg:rgba(16,185,129,.15); --to-fg:#6ee7b7;
    --sev-low:#475569;
    color-scheme:dark;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;
    font-family:"Noto Sans TC",ui-sans-serif,system-ui,"PingFang TC","Microsoft JhengHei",sans-serif;line-height:1.6}
  code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  [hidden]{display:none!important}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .small{font-size:12px}
  .wrap{max-width:1500px;margin:0 auto;padding:14px 16px 40px}
  @media(min-width:1024px){.wrap{padding:14px 40px 48px}}

  /* 工具列 */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0 16px}
  .brand{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .tools{display:flex;gap:8px}
  .tbtn{border:1px solid var(--line-2);background:var(--surface);color:var(--text);border-radius:8px;
    padding:6px 12px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
  .tbtn:hover{border-color:var(--muted)}

  /* 報頭 */
  .head{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px}
  .eyebrow{font-size:12px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin:0}
  h1.title{font-size:26px;line-height:1.25;font-weight:700;color:var(--head);margin:4px 0 0;word-break:break-word}
  @media(min-width:640px){h1.title{font-size:30px}}
  .meta{margin:12px 0 0;display:flex;flex-wrap:wrap;gap:4px 24px;font-size:14px;color:var(--muted)}
  .meta b{color:var(--text);font-weight:500;word-break:break-all}
  .verdict{flex:none;border-radius:12px;padding:10px 18px;text-align:center;box-shadow:var(--shadow);border:1px solid transparent}
  .verdict .vlabel{font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.7}
  .verdict .vtext{font-size:19px;font-weight:700;line-height:1.1;margin-top:2px}
  .verdict.lv-need{background:var(--fail-bg);color:var(--fail-fg);border-color:var(--fail-dot)}
  .verdict.lv-flaw{background:#ffedd5;color:#c2410c;border-color:#fdba74}
  html[data-theme="dark"] .verdict.lv-flaw{background:rgba(249,115,22,.16);color:#fdba74;border-color:rgba(249,115,22,.4)}
  .verdict.lv-soso{background:var(--warn-bg);color:var(--warn-fg);border-color:var(--warn-dot)}
  .verdict.lv-pass{background:var(--pass-bg);color:var(--pass-fg);border-color:var(--pass-dot)}

  /* 分頁 */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:22px}
  .tab{appearance:none;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;
    padding:10px 16px;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;font-family:inherit}
  .tab:hover{color:var(--head)}
  .tab.active{color:var(--head);border-bottom-color:var(--head)}

  .intro{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:10px;
    padding:12px 16px;margin:0 0 16px;font-size:14px;color:var(--muted);line-height:1.7}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:20px}
  .ratecard-info{min-width:0}
  .rate-delta{font-size:12px;font-weight:600;margin-left:8px;white-space:nowrap}
  .rate-delta.up{color:var(--pass-fg)} .rate-delta.down{color:var(--fail-fg)} .rate-delta.flat{color:var(--faint)}
  .spark{margin:6px 0;line-height:0}
  .spark svg{display:block;width:130px;height:34px}
  .stat.jump{cursor:pointer;transition:border-color .15s}
  .stat.jump:hover{border-color:var(--muted)}
  .priority-card{margin-bottom:16px;border-left:3px solid var(--fail-dot)}
  .pri{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-top:1px solid var(--line);cursor:pointer}
  .pri:first-child{border-top:none}
  .pri-sev{flex:none;font-size:11px;font-weight:700;color:#fff;border-radius:5px;padding:2px 7px;margin-top:1px}
  .pri-main{min-width:0;flex:1}
  .pri-title{font-weight:500;color:var(--text)}
  .pri-fix{font-size:12px;color:var(--muted);margin-top:2px}
  .pri-fix code{font-family:ui-monospace,Menlo,Consolas,monospace;background:var(--surface-2);border-radius:4px;padding:1px 5px}
  .clickrow{cursor:pointer;border-radius:6px}
  .clickrow:hover{background:var(--surface-2)}
  .sevchip{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--line-2);
    border-radius:99px;padding:5px 12px;font-size:12px;color:var(--text);cursor:pointer}
  .sevchip b{font-weight:600} .sevchip .x{color:var(--faint);font-weight:700}
  .card+.card,.stack>*+*{margin-top:16px}
  .card-title{font-size:14px;font-weight:600;color:var(--head);margin:0 0 16px}

  /* 統計卡 */
  .stats{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
  .stat{flex:1 1 120px;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px}
  .stat .num{font-size:26px;font-weight:700;color:var(--head);line-height:1}
  .stat .cap{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-top:6px}
  .stat.pass .num{color:var(--pass-fg)} .stat.fail .num{color:var(--fail-fg)} .stat.warn .num{color:var(--warn-fg)}
  .ratecard{flex:2 1 250px;display:flex;align-items:center;gap:16px}
  .ring{width:82px;height:82px;border-radius:50%;flex:none;display:grid;place-items:center;
    background:conic-gradient(var(--rc,#10b981) calc(var(--p,0)*1%),var(--ring-track) 0)}
  .ring .hole{width:64px;height:64px;border-radius:50%;background:var(--surface);display:grid;place-items:center;
    font-size:20px;font-weight:700;color:var(--head)}

  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:820px){.two{grid-template-columns:1fr}}

  /* 橫條(嚴重度 / 分類) */
  .row{display:flex;align-items:center;gap:12px;font-size:14px}
  .row+.row{margin-top:12px}
  .row .lbl{flex:none;width:48px;font-weight:500}
  .row .lbl.wide{width:160px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track{flex:1;height:10px;border-radius:99px;background:var(--surface-2);overflow:hidden}
  .track.seg{display:flex}
  .track>.fill{height:100%;border-radius:99px}
  .track.seg>.fill{border-radius:0}
  .row .val{flex:none;width:26px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}

  /* 與上次差異 */
  .delta3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center}
  .deltacard{background:var(--surface-2);border-radius:10px;padding:12px 4px}
  .deltacard .dnum{font-size:24px;font-weight:700} .deltacard .dcap{font-size:12px;color:var(--faint);margin-top:4px}

  /* 本次結果 */
  .controls{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:16px}
  .search{flex:1 1 220px;max-width:340px;border:1px solid var(--line-2);background:var(--surface);color:var(--text);
    border-radius:99px;padding:8px 14px;font-size:13px;font-family:inherit}
  .filters{display:flex;flex-wrap:wrap;gap:6px}
  .filterbtn{border:1px solid var(--line-2);background:var(--surface);color:var(--muted);border-radius:99px;
    padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
  .filterbtn:hover{border-color:var(--muted)}
  .filterbtn.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}

  .group{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .group+.group{margin-top:16px}
  .group-head{padding:12px 18px;background:var(--surface-2);border-bottom:1px solid var(--line);font-size:14px;font-weight:600;color:var(--head)}
  .group-head span{color:var(--faint);font-weight:400}
  .item{display:flex;gap:12px;align-items:flex-start;padding:14px 18px;border-top:1px solid var(--line)}
  .item:first-child{border-top:none}
  .item.done{opacity:.55}
  .item.done .it-title{text-decoration:line-through}
  .chk{flex:none;width:17px;height:17px;margin-top:3px;accent-color:var(--pass-dot);cursor:pointer}
  .badge{flex:none;display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:7px;font-size:12px;font-weight:600;margin-top:1px}
  .badge .dot{width:6px;height:6px;border-radius:50%}
  .badge.pass{background:var(--pass-bg);color:var(--pass-fg)} .badge.pass .dot{background:var(--pass-dot)}
  .badge.fail{background:var(--fail-bg);color:var(--fail-fg)} .badge.fail .dot{background:var(--fail-dot)}
  .badge.warn{background:var(--warn-bg);color:var(--warn-fg)} .badge.warn .dot{background:var(--warn-dot)}
  .badge.na{background:var(--na-bg);color:var(--na-fg)} .badge.na .dot{background:var(--na-dot)}
  .badge.info{background:var(--info-bg);color:var(--info-fg)} .badge.info .dot{background:var(--info-dot)}
  .item-main{min-width:0;flex:1}
  .it-head{display:flex;flex-wrap:wrap;align-items:baseline;gap:4px 12px}
  .it-title{font-weight:500;color:var(--text)}
  .it-id{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;color:var(--faint);background:var(--surface-2);border:1px solid var(--line);border-radius:5px;padding:0 6px}
  .sev-tag{font-size:11px;font-weight:500}
  .it-meta{display:flex;flex-wrap:wrap;align-items:center;gap:4px 14px;margin-top:6px}
  .since{font-size:12px;font-weight:500}
  .since.ok{color:var(--pass-fg)} .since.bad{color:var(--warn-fg)}
  .since-dt{color:var(--faint);font-weight:400;margin-left:6px;font-variant-numeric:tabular-nums}
  .track-mini{display:flex;align-items:center;flex-wrap:wrap;gap:3px}
  .track-mini i{width:12px;height:12px;border-radius:3px;display:inline-block}
  .track-mini i.now{box-shadow:0 0 0 2px var(--surface),0 0 0 3px var(--muted)}
  .item.fresh{background:rgba(16,185,129,.10);box-shadow:inset 3px 0 0 var(--pass-dot)}
  .ev{margin-top:6px;font-size:12px;font-family:ui-monospace,Menlo,Consolas,monospace;color:var(--muted);
    background:var(--surface-2);border-radius:6px;padding:4px 8px;word-break:break-all}
  .rec{margin-top:6px;font-size:14px;color:var(--text)} .rec b{color:var(--faint);font-weight:400}
  .fixbox{margin-top:8px;border:1px solid var(--fix-border);background:var(--fix-bg);border-radius:8px;padding:8px 12px;font-size:13px}
  .fix-title{font-size:12px;font-weight:600;color:var(--fix-fg);margin-bottom:4px}
  .fix-row{margin-top:3px} .fix-row .k{color:var(--fix-fg);opacity:.8}
  .fix-arrow{color:var(--warn-dot);font-weight:700;margin:0 4px}
  .fix-from,.fix-to{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;padding:2px 7px;border-radius:5px;word-break:break-all}
  .fix-from{background:var(--from-bg);color:var(--from-fg);text-decoration:line-through}
  .fix-to{background:var(--to-bg);color:var(--to-fg)}
  .fix-row .ctx{color:var(--text);line-height:1.9}
  .fix-row .ctx .fix-from,.fix-row .ctx .fix-to{margin:0 1px}
  .empty{font-size:14px;color:var(--faint);text-align:center;padding:30px}

  /* 歷史趨勢 */
  .trend-row{display:flex;align-items:flex-end;gap:12px;border-bottom:1px solid var(--line)}
  .trend-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px}
  .trend-val{font-size:12px;font-weight:600;color:var(--muted)}
  .trend-bar{width:100%;max-width:48px;border-radius:6px 6px 0 0}
  .trend-labels{display:flex;gap:12px;margin-top:8px}
  .trend-label{flex:1;text-align:center;font-size:11px;color:var(--faint)}
  .trend-note{font-size:11px;color:var(--faint);text-align:right;margin:8px 0 0}
  .tl-item{position:relative;padding:0 0 20px 24px}
  .tl-item:last-child{padding-bottom:0}
  .tl-dot{position:absolute;left:0;top:6px;width:12px;height:12px;border-radius:50%;border:2px solid var(--surface)}
  .tl-line{position:absolute;left:5px;top:16px;bottom:0;width:1px;background:var(--line)}
  .tl-head{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
  .tl-date{font-weight:600;color:var(--head)}
  .tl-rate{padding:2px 8px;border-radius:99px;font-size:12px;font-weight:600}
  .tl-counts{font-size:12px;color:var(--faint)}
  .tl-change{margin-top:6px;font-size:13px}
  .tl-change .k{font-size:12px;font-weight:600;margin-right:4px}

  .foot{margin-top:36px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--faint);
    display:flex;flex-wrap:wrap;justify-content:space-between;gap:8px}
  .foot b{color:var(--muted);font-weight:500}

  .print-only{display:none}

  /* 列印 / 存 PDF:攤平三分頁、隱藏互動元件、強制可印色彩 */
  @media print{
    .no-print{display:none!important}
    .panel[hidden]{display:block!important}
    .panel{margin-bottom:18px}
    .print-only{display:block;font-size:16px;font-weight:700;color:#0f172a;margin:0 0 10px;padding-bottom:4px;border-bottom:2px solid #cbd5e1}
    .wrap{max-width:none;padding:0}
    body{background:#fff}
    .card,.group,.stat,.item,.tl-item,.deltacard{break-inside:avoid}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body>
<!-- 結果資料由 render_report.py 注入(取代下方佔位符) -->
<script>window.REPORT_DATA = "__REPORT_DATA__";</script>

<div class="wrap">

  <div class="topbar no-print">
    <span class="brand">Check Report・檢查報告</span>
    <div class="tools">
      <button class="tbtn" id="btn-theme" type="button">🌙 深色</button>
      <button class="tbtn" id="btn-print" type="button">🖨 列印 / 存 PDF</button>
    </div>
  </div>

  <header class="head">
    <div style="min-width:0">
      <p class="eyebrow">逐項檢查報告</p>
      <h1 class="title" id="r-title">—</h1>
      <div class="meta">
        <span>目標 <b id="r-target">—</b></span>
        <span>清單 <b id="r-checklist">—</b></span>
        <span>檢查時間 <b id="r-date">—</b></span>
        <span id="r-count-wrap" hidden>檢查次數 <b id="r-count">—</b></span>
      </div>
    </div>
    <div class="verdict" id="r-verdict">
      <div class="vlabel">總評 Verdict</div>
      <div class="vtext" id="r-verdict-text">—</div>
    </div>
  </header>

  <nav class="tabs no-print">
    <button class="tab" data-tab="overview" type="button">總覽</button>
    <button class="tab" data-tab="current" type="button">本次結果</button>
    <button class="tab" data-tab="history" type="button">歷史趨勢</button>
  </nav>

  <!-- 總覽 -->
  <section class="panel" data-panel="overview">
    <h2 class="print-only">總覽</h2>
    <p class="intro" id="o-intro" hidden></p>
    <div class="stats">
      <div class="stat ratecard">
        <div class="ring" id="o-ring"><div class="hole" id="o-rate">0%</div></div>
        <div class="ratecard-info">
          <div class="cap">通過率<span class="rate-delta" id="o-trend"></span></div>
          <div class="spark" id="o-spark" hidden></div>
          <div class="muted small" id="o-rate-sub">已評分(排除 N/A・參考)</div>
        </div>
      </div>
      <div class="stat"><div class="num" id="o-total">0</div><div class="cap">總項數</div></div>
      <div class="stat pass jump" data-jump="pass"><div class="num" id="o-pass">0</div><div class="cap">通過</div></div>
      <div class="stat fail jump" data-jump="fail"><div class="num" id="o-fail">0</div><div class="cap">失敗</div></div>
      <div class="stat warn jump" data-jump="warn"><div class="num" id="o-warn">0</div><div class="cap">提醒</div></div>
    </div>
    <div class="card priority-card" id="o-priority-wrap" hidden>
      <h2 class="card-title">需優先處理 <span class="faint" id="o-priority-n" style="font-weight:400"></span></h2>
      <div id="o-priority"></div>
    </div>
    <div class="two">
      <div class="card"><h2 class="card-title">未過項目・嚴重度分佈 <span class="faint small" style="font-weight:400">(點列跳轉)</span></h2><div id="o-severity"></div></div>
      <div class="card"><h2 class="card-title">與上次相比</h2>
        <div class="delta3" id="o-delta"></div>
        <p class="muted" id="o-delta-none" hidden>首次檢查,尚無對照基準。</p>
      </div>
    </div>
    <div class="card" style="margin-top:16px"><h2 class="card-title">分類概況 <span class="faint small" style="font-weight:400">(點列跳轉)</span></h2><div id="o-categories"></div></div>
  </section>

  <!-- 本次結果 -->
  <section class="panel" data-panel="current" hidden>
    <h2 class="print-only">本次結果</h2>
    <div class="controls">
      <input class="search no-print" id="c-search" type="search" placeholder="🔍 搜尋項目 / 證據 / 建議…" autocomplete="off">
      <div class="filters no-print" id="c-filters"></div>
      <span id="c-sevchip" class="no-print"></span>
    </div>
    <div id="c-groups" class="stack"></div>
  </section>

  <!-- 歷史趨勢 -->
  <section class="panel" data-panel="history" hidden>
    <h2 class="print-only">歷史趨勢</h2>
    <div class="card"><h2 class="card-title">通過率走勢<span id="h-count" class="faint small" style="font-weight:400"></span></h2><div id="h-trend"></div></div>
    <div class="card"><h2 class="card-title">逐次變更紀錄</h2>
      <p class="muted small" style="margin:-8px 0 16px">每次檢查相對前一次:修好了什麼、又新發現什麼、哪些仍未解。</p>
      <div id="h-delta"></div>
    </div>
  </section>

  <footer class="foot">
    <span>由 <b>generating-check-reports</b> skill 生成<span id="f-model"></span>・單檔可攜・可離線</span>
    <span id="f-generated"></span>
  </footer>
</div>

<script>
(function () {
  "use strict";
  var D = window.REPORT_DATA;
  var byId = function (id) { return document.getElementById(id); };
  if (!D || typeof D !== "object") {
    document.querySelector(".wrap").innerHTML =
      '<p style="color:#be123c;padding:30px">REPORT_DATA 未注入或格式錯誤。請以 render_report.py 產生本檔。</p>'; return;
  }
  var esc = function (s) { return String(s == null ? "" : s).replace(/[&<>"]/g,
    function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); };
  var items = Array.isArray(D.items) ? D.items : [];
  var sum = D.summary || {};

  var STATUS = { pass: "通過", fail: "失敗", warn: "提醒", na: "N/A", info: "參考" };
  var SEVERITY = { critical: "嚴重", high: "高", medium: "中", low: "低", info: "資訊" };
  var SEVVAR = { critical: "--sev-critical", high: "--sev-high", medium: "--sev-medium", low: "--sev-low", info: "--sev-info" };
  var slabel = function (k) { return STATUS[k] || STATUS.info; };
  var skey = function (k) { return STATUS[k] ? k : "info"; };
  var sevlabel = function (k) { return SEVERITY[k] || SEVERITY.info; };
  var sevvar = function (k) { return SEVVAR[k] || SEVVAR.info; };

  // ── 報頭 ──
  byId("r-title").textContent = D.title || "檢查報告";
  byId("r-target").textContent = D.target || "—";
  byId("r-checklist").textContent = D.checklist || "—";
  byId("r-date").textContent = D.date || "—";
  var nChecks = Array.isArray(D.history) ? D.history.length : 0;
  if (nChecks > 0) { byId("r-count").textContent = "第 " + nChecks + " 次"; byId("r-count-wrap").hidden = false; }
  document.title = (D.title || "檢查報告") + " — 檢查報告";

  var verdict = D.verdict || autoVerdict();
  function autoVerdict() {
    var critHigh = items.some(function (i) { return i.status === "fail" && (i.severity === "critical" || i.severity === "high"); });
    if (critHigh) return "需修正";
    if ((sum.fail || 0) > 0) return "有缺失";
    if ((sum.warn || 0) > 0) return "大致通過";
    return "通過";
  }
  var vlv = { "需修正": "lv-need", "有缺失": "lv-flaw", "大致通過": "lv-soso", "通過": "lv-pass" };
  byId("r-verdict").className = "verdict " + (vlv[verdict] || "lv-soso");
  byId("r-verdict-text").textContent = verdict;

  // 報告介紹(選用)
  if (D.intro) { byId("o-intro").textContent = D.intro; byId("o-intro").hidden = false; }

  // ── 總覽:統計 ──
  var rate = sum.pass_rate != null ? sum.pass_rate : 0;
  byId("o-total").textContent = sum.total != null ? sum.total : items.length;
  byId("o-pass").textContent = sum.pass || 0;
  byId("o-fail").textContent = sum.fail || 0;
  byId("o-warn").textContent = sum.warn || 0;
  byId("o-rate").textContent = rate + "%";
  var ring = byId("o-ring");
  ring.style.setProperty("--p", rate);
  var rateColor = rate >= 90 ? "#10b981" : rate >= 70 ? "#f59e0b" : "#f43f5e";
  ring.style.setProperty("--rc", rateColor);

  // 通過率「較上次」變化 + 迷你走勢線
  var hist = Array.isArray(D.history) ? D.history : [];
  if (hist.length >= 2) {
    var prevRate = hist[hist.length - 2].pass_rate || 0;
    var diff = Math.round((rate - prevRate) * 10) / 10;
    var td = byId("o-trend");
    td.className = "rate-delta " + (diff > 0 ? "up" : diff < 0 ? "down" : "flat");
    td.textContent = (diff > 0 ? "▲ +" + diff : diff < 0 ? "▼ " + diff : "= 持平") + (diff ? "% 較上次" : "");
    var rates = hist.map(function (h) { return h.pass_rate || 0; });
    var W = 120, H = 34, pad = 3, n = rates.length;
    var xs = function (k) { return n <= 1 ? W / 2 : pad + k / (n - 1) * (W - 2 * pad); };
    var ys = function (r) { return H - pad - r / 100 * (H - 2 * pad); };
    var pts = rates.map(function (r, k) { return xs(k).toFixed(1) + "," + ys(r).toFixed(1); }).join(" ");
    byId("o-spark").innerHTML =
      '<svg viewBox="0 0 120 34" preserveAspectRatio="none" width="130" height="34">' +
      '<polyline points="' + pts + '" fill="none" stroke="' + rateColor + '" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
      '<circle cx="' + xs(n - 1).toFixed(1) + '" cy="' + ys(rate).toFixed(1) + '" r="2.6" fill="' + rateColor + '"/></svg>';
    byId("o-spark").hidden = false;
    byId("o-rate-sub").textContent = "歷次走勢・共 " + n + " 次";
  }

  // 嚴重度分佈
  var sevCount = {}; Object.keys(SEVERITY).forEach(function (k) { sevCount[k] = 0; });
  items.forEach(function (i) { if (i.status === "fail" || i.status === "warn") sevCount[i.severity in SEVERITY ? i.severity : "info"]++; });
  var sevMax = Math.max(1, Object.keys(sevCount).reduce(function (m, k) { return Math.max(m, sevCount[k]); }, 0));
  var sevHtml = ["critical", "high", "medium", "low", "info"].map(function (k) {
    var n = sevCount[k], hit = n > 0;
    return '<div class="row' + (hit ? " clickrow" : "") + '"' + (hit ? ' data-sev="' + k + '" title="點此看這些項目"' : "") + '>' +
      '<span class="lbl" style="color:var(' + sevvar(k) + ')">' + sevlabel(k) + '</span>' +
      '<div class="track"><div class="fill" style="width:' + (n / sevMax * 100) + '%;background:var(' + sevvar(k) + ')"></div></div>' +
      '<span class="val">' + n + '</span></div>';
  }).join("");
  byId("o-severity").innerHTML = (sevCount.critical + sevCount.high + sevCount.medium + sevCount.low + sevCount.info) ? sevHtml : '<p class="muted">無未過項目。</p>';

  // 與上次差異
  var delta = D.delta || { fixed: [], regressed: [], still_failing: [], has_prev: false };
  if (delta.has_prev) {
    byId("o-delta").innerHTML = [
      ["新修好", (delta.fixed || []).length, "var(--pass-fg)"],
      ["新壞掉", (delta.regressed || []).length, "var(--fail-fg)"],
      ["仍失敗", (delta.still_failing || []).length, "var(--warn-fg)"]
    ].map(function (d) {
      return '<div class="deltacard"><div class="dnum" style="color:' + d[2] + '">' + d[1] + '</div><div class="dcap">' + d[0] + '</div></div>';
    }).join("");
  } else { byId("o-delta").hidden = true; byId("o-delta-none").hidden = false; }

  // 需優先處理:critical / high 的失敗項(嚴重者在前)
  var priority = items.filter(function (i) { return i.status === "fail" && (i.severity === "critical" || i.severity === "high"); })
    .sort(function (a, b) { return (a.severity === "critical" ? 0 : 1) - (b.severity === "critical" ? 0 : 1); });
  if (priority.length) {
    byId("o-priority-n").textContent = "(" + priority.length + " 項)";
    byId("o-priority").innerHTML = priority.map(function (i) {
      var detail = i.fix ? ((i.fix.where ? '<code>' + esc(i.fix.where) + '</code> ' : "") + (i.fix.to != null ? "→ " + esc(i.fix.to) : esc(i.recommendation || "")))
        : esc(i.recommendation || "");
      return '<div class="pri" data-cat="' + esc(i.category || "未分類") + '" title="點此查看">' +
        '<span class="pri-sev" style="background:var(' + sevvar(i.severity) + ')">' + sevlabel(i.severity) + '</span>' +
        '<div class="pri-main"><div class="pri-title">' + esc(i.title || "—") +
        (i.id != null ? ' <span class="it-id">#' + esc(i.id) + '</span>' : "") + '</div>' +
        (detail ? '<div class="pri-fix">' + detail + '</div>' : "") + '</div></div>';
    }).join("");
    byId("o-priority-wrap").hidden = false;
  }

  // 分類概況
  function groupByCategory(list) {
    var m = {}; list.forEach(function (i) { var c = i.category || "未分類"; (m[c] = m[c] || []).push(i); }); return m;
  }
  var cats = groupByCategory(items);
  byId("o-categories").innerHTML = Object.keys(cats).map(function (c) {
    var g = cats[c];
    var p = g.filter(function (i) { return i.status === "pass"; }).length;
    var w = g.filter(function (i) { return i.status === "warn"; }).length;
    var f = g.filter(function (i) { return i.status === "fail"; }).length;
    function seg(n, v) { return n ? '<div class="fill" style="width:' + (n / g.length * 100) + '%;background:var(' + v + ')"></div>' : ""; }
    return '<div class="row clickrow" data-cat="' + esc(c) + '" title="點此看此分類"><span class="lbl wide" title="' + esc(c) + '">' + esc(c) + '</span>' +
      '<div class="track seg">' + seg(p, "--pass-dot") + seg(w, "--warn-dot") + seg(f, "--fail-dot") + '</div>' +
      '<span class="val" style="width:auto">' + p + '/' + g.length + '</span></div>';
  }).join("");

  // ── 本次結果:搜尋 + 篩選 + 勾選 ──
  var ckey = "cr-check::" + (D.title || "") + "::" + (D.date || "");
  function loadChecks() { try { return new Set(JSON.parse(localStorage.getItem(ckey) || "[]")); } catch (e) { return new Set(); } }
  function saveChecks(set) { try { localStorage.setItem(ckey, JSON.stringify(Array.from(set))); } catch (e) {} }
  var checked = loadChecks();

  var activeFilter = "all", query = "", sevFilter = null, catFilter = null;
  function counts(k) { return items.filter(function (i) { return i.status === k; }).length; }
  function renderFilters() {
    var defs = [["all", "全部 " + items.length]].concat(["fail", "warn", "pass", "na", "info"].map(function (k) { return [k, slabel(k) + " " + counts(k)]; }));
    byId("c-filters").innerHTML = defs.map(function (f) {
      return '<button class="filterbtn' + (activeFilter === f[0] ? " active" : "") + '" data-f="' + f[0] + '">' + esc(f[1]) + '</button>';
    }).join("");
    byId("c-filters").querySelectorAll(".filterbtn").forEach(function (b) {
      b.onclick = function () { activeFilter = b.getAttribute("data-f"); sevFilter = null; catFilter = null; renderFilters(); renderChips(); renderGroups(); };
    });
  }
  function matchQuery(i) {
    if (!query) return true;
    return ((i.title || "") + " " + (i.evidence || "") + " " + (i.recommendation || "") + " " + (i.category || "")).toLowerCase().indexOf(query) >= 0;
  }
  // 嚴重度篩選只對未過項(fail/warn)有意義,與總覽「未過項目嚴重度分佈」一致
  function matchSev(i) { return !sevFilter || (i.severity === sevFilter && (i.status === "fail" || i.status === "warn")); }
  function matchCat(i) { return !catFilter || (i.category || "未分類") === catFilter; }
  function renderChips() {
    var html = (sevFilter ? '<button class="sevchip" data-clear="sev">嚴重度:<b>' + esc(sevlabel(sevFilter)) + '</b><span class="x">✕</span></button>' : "") +
      (catFilter ? '<button class="sevchip" data-clear="cat">分類:<b>' + esc(catFilter) + '</b><span class="x">✕</span></button>' : "");
    byId("c-sevchip").innerHTML = html;
    byId("c-sevchip").querySelectorAll("[data-clear]").forEach(function (b) {
      b.onclick = function () { if (b.getAttribute("data-clear") === "sev") sevFilter = null; else catFilter = null; renderChips(); renderGroups(); };
    });
  }
  function jump(opts) {  // 從總覽點擊跳轉到本次結果並套用篩選
    activeFilter = opts.status || "all"; sevFilter = opts.sev || null; catFilter = opts.cat || null;
    query = ""; byId("c-search").value = "";
    activate("current"); renderFilters(); renderChips(); renderGroups();
    window.scrollTo({ top: 0 });
  }
  function renderGroups() {
    var m = groupByCategory(items);
    var html = Object.keys(m).map(function (c) {
      var g = m[c].filter(function (i) { return (activeFilter === "all" || i.status === activeFilter) && matchQuery(i) && matchSev(i) && matchCat(i); });
      if (!g.length) return "";
      return '<div class="group"><div class="group-head">' + esc(c) + ' <span>(' + g.length + ')</span></div>' +
        g.map(itemRow).join("") + '</div>';
    }).join("");
    byId("c-groups").innerHTML = html || '<p class="empty">沒有符合的項目。</p>';
    byId("c-groups").querySelectorAll(".chk").forEach(function (cb) {
      cb.onchange = function () {
        var id = cb.getAttribute("data-id");
        if (cb.checked) checked.add(id); else checked.delete(id);
        saveChecks(checked);
        cb.closest(".item").classList.toggle("done", cb.checked);
      };
    });
  }
  function fixBlock(f) {
    if (!f || typeof f !== "object") return "";
    var rows = "";
    if (f.where) rows += '<div class="fix-row"><span class="k">位置</span> <code class="fix-to" style="background:var(--surface-2);color:var(--text)">' + esc(f.where) + '</code></div>';
    if (f.what) rows += '<div class="fix-row"><span class="k">內容</span> ' + esc(f.what) + '</div>';
    var hasChange = f.from != null || f.to != null;
    var hasCtx = hasChange && (f.before != null || f.after != null);
    if (hasCtx) {
      // 帶前後文:原文 / 改為兩行,把改動的字嵌進上下文高亮(供論文修改等需精準定位的場景)
      var bf = esc(f.before || ""), af = esc(f.after || "");
      rows += '<div class="fix-row"><span class="k">原文</span> <span class="ctx">' + bf +
        (f.from != null ? '<span class="fix-from">' + esc(f.from) + '</span>' : "") + af + '</span></div>';
      rows += '<div class="fix-row"><span class="k">改為</span> <span class="ctx">' + bf +
        (f.to != null ? '<span class="fix-to">' + esc(f.to) + '</span>' : "") + af + '</span></div>';
    } else if (hasChange) {
      rows += '<div class="fix-row">' +
        (f.from != null ? '<span class="fix-from">' + esc(f.from) + '</span>' : '<span class="faint small">(新增)</span>') +
        '<span class="fix-arrow">→</span>' +
        (f.to != null ? '<span class="fix-to">' + esc(f.to) + '</span>' : '<span class="faint small">(刪除)</span>') + '</div>';
    }
    if (!rows) return "";
    return '<div class="fixbox"><div class="fix-title">需修改 — 哪裡 / 什麼 / 改成什麼</div>' + rows + '</div>';
  }
  function itemRow(i, idx) {
    var id = String(i.id != null ? i.id : (i.category || "") + "#" + (i.title || idx));
    var k = skey(i.status), done = checked.has(id);
    var fresh = i.status === "pass" && i.since && nChecks >= 2 && i.since.n === nChecks; // 本次才轉綠
    var sv = (i.status === "fail" || i.status === "warn") && i.severity ?
      '<span class="sev-tag" style="color:var(' + sevvar(i.severity) + ')">嚴重度:' + sevlabel(i.severity) + '</span>' : "";
    // since 文字:精簡「第 N 次起通過/未解決」+ 緊湊時間(去年份;完整時間在色塊 tooltip 與趨勢頁)
    var since = "";
    if (nChecks >= 2 && i.since && (i.status === "pass" || i.status === "fail" || i.status === "warn")) {
      var ok = i.status === "pass";
      var dshort = String(i.since.date).replace(/^\d{4}-/, "");
      since = fresh
        ? '<span class="since ok">✨ 本次・第 ' + i.since.n + ' 次新通過</span>'
        : '<span class="since ' + (ok ? "ok" : "bad") + '">' + (ok ? "✓" : "⚠") + ' 第 ' + i.since.n + ' 次起' +
          (ok ? "通過" : "未解決") + '<span class="since-dt">' + esc(dshort) + '</span></span>';
    }
    // 逐項迷你狀態軌:歷次 pass/warn/fail 變化(左舊 → 右新),置於行首作視覺錨
    var track = "";
    if (nChecks >= 2 && Array.isArray(i.track)) {
      track = '<div class="track-mini" title="歷次狀態(左舊→右新)">' + i.track.map(function (s, ci) {
        var key = s && STATUS[s] ? s : null;
        var last = ci === i.track.length - 1;
        var dt = (D.history && D.history[ci]) ? D.history[ci].date : ("第 " + (ci + 1) + " 次");
        return '<i class="' + (last ? "now" : "") + '" style="background:' + (key ? "var(--" + key + "-dot)" : "var(--line-2)") +
          '" title="' + esc(dt + " — " + (key ? slabel(key) : "未列入")) + '"></i>';
      }).join("") + '</div>';
    }
    var meta = (since || track) ? '<div class="it-meta">' + track + since + '</div>' : "";
    return '<div class="item' + (done ? " done" : "") + (fresh ? " fresh" : "") + '">' +
      '<input class="chk no-print" type="checkbox" data-id="' + esc(id) + '"' + (done ? " checked" : "") + ' title="標記已處理">' +
      '<span class="badge ' + k + '"><span class="dot"></span>' + slabel(k) + '</span>' +
      '<div class="item-main">' +
        '<div class="it-head"><span class="it-title">' + esc(i.title || i.id || "—") + '</span>' +
          (i.id != null ? '<span class="it-id">#' + esc(i.id) + '</span>' : "") + sv + '</div>' +
        meta +
        (i.evidence ? '<div class="ev">' + esc(i.evidence) + '</div>' : "") +
        (i.recommendation ? '<div class="rec"><b>建議:</b> ' + esc(i.recommendation) + '</div>' : "") +
        fixBlock(i.fix) +
      '</div></div>';
  }

  // ── 歷史趨勢 ──
  var history = Array.isArray(D.history) ? D.history : [];
  function renderHistory() {
    byId("h-count").textContent = history.length ? "　共 " + history.length + " 次檢查" : "";
    if (!history.length) { byId("h-trend").innerHTML = '<p class="muted">尚無歷史記錄。</p>'; }
    else {
      var TRACK = 150;
      byId("h-trend").innerHTML =
        '<div class="trend-row" style="height:' + (TRACK + 22) + 'px">' + history.map(function (h) {
          var r = h.pass_rate || 0, c = r >= 90 ? "var(--pass-dot)" : r >= 70 ? "var(--warn-dot)" : "var(--fail-dot)";
          return '<div class="trend-col" title="' + esc(h.date) + ' — ' + r + '%"><span class="trend-val">' + r + '%</span>' +
            '<div class="trend-bar" style="height:' + Math.max(4, r / 100 * TRACK) + 'px;background:' + c + '"></div></div>';
        }).join("") + '</div>' +
        '<div class="trend-labels">' + history.map(function (h) {
          var pp = String(h.date || "").split(" "), day = pp[0] || "", tm = pp.slice(1).join(" ");
          return '<div class="trend-label">' + esc(day) + (tm ? '<br>' + esc(tm) : "") +
            '<br><span class="faint">' + (h.pass || 0) + '/' + (h.fail || 0) + '/' + (h.warn || 0) + '</span></div>';
        }).join("") + '</div>' +
        '<p class="trend-note">每欄下方:通過 / 失敗 / 提醒</p>';
    }
    var tl = Array.isArray(D.timeline) ? D.timeline : [];
    function line(label, arr, col) {
      return (arr && arr.length) ? '<div class="tl-change"><span class="k" style="color:' + col + '">' + label + ' (' + arr.length + ')</span>' +
        '<span class="muted">: ' + arr.map(esc).join("、") + '</span></div>' : "";
    }
    byId("h-delta").innerHTML = tl.length ? tl.slice().reverse().map(function (t, idx) {
      var latest = idx === 0;
      var rcol = t.pass_rate >= 90 ? "--pass" : t.pass_rate >= 70 ? "--warn" : "--fail";
      var body = t.is_first
        ? (line("初次發現問題", t.new_issues, "var(--fail-fg)") || '<div class="tl-change muted small">初次檢查即全數通過</div>')
        : (line("✅ 本次修好", t.fixed, "var(--pass-fg)") + line("🆕 新發現問題", t.new_issues, "var(--fail-fg)") + line("⚠️ 仍未解決", t.still_failing, "var(--warn-fg)"))
          || '<div class="tl-change faint small">與上次相比無狀態變化</div>';
      return '<div class="tl-item">' +
        '<span class="tl-dot" style="background:' + (latest ? "var(--head)" : "var(--line-2)") + '"></span>' +
        (idx < tl.length - 1 ? '<span class="tl-line"></span>' : "") +
        '<div class="tl-head"><span class="tl-date">' + esc(t.date) + '</span>' +
          '<span class="tl-rate" style="background:var(' + rcol + '-bg);color:var(' + rcol + '-fg)">通過率 ' + t.pass_rate + '%</span>' +
          '<span class="tl-counts">通過 ' + t.pass + ' / 失敗 ' + t.fail + ' / 提醒 ' + t.warn + '</span>' +
          (latest ? '<span class="faint small">(最新)</span>' : "") + '</div>' + body + '</div>';
    }).join("") : '<p class="muted">尚無歷史記錄。</p>';
  }

  byId("f-generated").textContent = "檢查時間 " + (D.date || "");
  byId("f-model").textContent = D.model ? "・AI 模型:" + D.model : "";

  // ── 分頁 ──
  var tabs = document.querySelectorAll(".tab"), panels = document.querySelectorAll(".panel");
  function activate(name) {
    tabs.forEach(function (t) { t.classList.toggle("active", t.getAttribute("data-tab") === name); });
    panels.forEach(function (p) { p.hidden = p.getAttribute("data-panel") !== name; });
  }
  tabs.forEach(function (t) { t.onclick = function () { activate(t.getAttribute("data-tab")); }; });

  // ── 搜尋 ──
  byId("c-search").addEventListener("input", function () { query = this.value.trim().toLowerCase(); renderGroups(); });

  // ── 主題切換(淺 / 深),記憶於 localStorage ──
  var themeBtn = byId("btn-theme");
  function syncThemeBtn() {
    var dark = document.documentElement.getAttribute("data-theme") === "dark";
    themeBtn.textContent = dark ? "☀️ 淺色" : "🌙 深色";
  }
  themeBtn.onclick = function () {
    var dark = document.documentElement.getAttribute("data-theme") === "dark";
    if (dark) document.documentElement.removeAttribute("data-theme"); else document.documentElement.setAttribute("data-theme", "dark");
    try { localStorage.setItem("cr-theme", dark ? "light" : "dark"); } catch (e) {}
    syncThemeBtn();
  };
  syncThemeBtn();

  // ── 列印 / 存 PDF:列印時暫時強制淺色以省墨、印面清晰 ──
  var printedDark = false;
  window.addEventListener("beforeprint", function () {
    printedDark = document.documentElement.getAttribute("data-theme") === "dark";
    if (printedDark) document.documentElement.removeAttribute("data-theme");
  });
  window.addEventListener("afterprint", function () {
    if (printedDark) document.documentElement.setAttribute("data-theme", "dark");
  });
  byId("btn-print").onclick = function () { window.print(); };

  // ── 總覽點擊跳轉:統計卡(狀態)/ 嚴重度列 / 分類列 / 優先處理項 ──
  document.querySelectorAll(".stat.jump").forEach(function (el) { el.onclick = function () { jump({ status: el.getAttribute("data-jump") }); }; });
  byId("o-severity").querySelectorAll("[data-sev]").forEach(function (el) { el.onclick = function () { jump({ sev: el.getAttribute("data-sev") }); }; });
  byId("o-categories").querySelectorAll("[data-cat]").forEach(function (el) { el.onclick = function () { jump({ cat: el.getAttribute("data-cat") }); }; });
  byId("o-priority").querySelectorAll(".pri[data-cat]").forEach(function (el) { el.onclick = function () { jump({ cat: el.getAttribute("data-cat") }); }; });

  renderFilters(); renderChips(); renderGroups(); renderHistory(); activate("overview");
})();
</script>
</body>
</html>
