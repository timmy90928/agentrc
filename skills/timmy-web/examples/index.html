<!doctype html>
<!--
  timmy-web · 風格實驗室入口
  轉址到「目前選定的風格頁」(styles/<style>.html),帶上已選的主色/背景。預設 00-editorial 編輯手札。
  每個風格頁本身都內建「同風格的使用者 icon 設定」(風格/主色/背景),整頁皆為該風格,無外層舊樣式。
  另:choose_style.html(抽屜選擇器)、showcase-editorial-backup.html(原編輯風)。
-->
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>timmy-web · 風格實驗室</title>
  <script>
    (function(){
      var p = {}; try { p = JSON.parse(localStorage.getItem('timmy-web-stylelab')) || {}; } catch(e) {}
      var style = p.style || '00-editorial';
      var q = [];
      if (p.accent) q.push('accent=' + encodeURIComponent(p.accent));
      if (p.bg) q.push('bg=' + encodeURIComponent(p.bg));
      location.replace('styles/' + style + '.html' + (q.length ? ('?' + q.join('&')) : ''));
    })();
  </script>
  <style>body{font-family:system-ui,sans-serif;display:grid;place-items:center;height:100vh;margin:0;color:#888}</style>
<!-- ===== favicon · 山徑手記 羅盤方位玫瑰 (compass rose) · timmy-web-favicon =====
     依本頁解析後的 --accent 自動著色(含 ?accent= / store 覆寫);編輯風金棕北針 + 暖紙底。
     屬「示範內容」非主題引擎,故不進 tw-engine.js;放各頁 <head> 末(pre-paint 之後)讀已解析 accent。
     匯出「下載 HTML」剝除 <script> 但保留執行期注入的 <link rel=icon>,故乾淨檔仍帶 favicon。 -->
<script>
(function(){
  function mix(hex){ // accent 與黑混 30%,作描邊 / 環(淺色 accent 仍可辨識);回 #rrggbb
    hex=(hex||'').trim().replace('#','');
    if(hex.length===3) hex=hex.replace(/./g,'$&$&');
    if(hex.length<6) return '#142537';
    var n=parseInt(hex.slice(0,6),16);
    function d(x){ x=Math.round(x*0.7); return (x<16?'0':'')+x.toString(16); }
    return '#'+d((n>>16)&255)+d((n>>8)&255)+d(n&255);
  }
  function paint(){
    var accent=(getComputedStyle(document.documentElement).getPropertyValue('--accent')||'').trim()||'#1d3557',
        deep=mix(accent), gold='#9a7b4f', paper='#f4efe3',
        svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">'
          +'<rect x="1" y="1" width="30" height="30" rx="6.5" fill="'+paper+'"/>'
          +'<circle cx="16" cy="16" r="11.2" fill="none" stroke="'+deep+'" stroke-width="1.1"/>'
          +'<g transform="rotate(45 16 16)"><path d="M16 8 17.7 14.3 24 16 17.7 17.7 16 24 14.3 17.7 8 16 14.3 14.3Z" fill="'+gold+'" fill-opacity=".32"/></g>'
          +'<path d="M16 3.5 18.5 13.5 28.5 16 18.5 18.5 16 28.5 13.5 18.5 3.5 16 13.5 13.5Z" fill="'+accent+'" stroke="'+deep+'" stroke-width=".7" stroke-linejoin="round"/>'
          +'<path d="M16 3.5 18.5 13.5 13.5 13.5Z" fill="'+gold+'"/>'
          +'<circle cx="16" cy="16" r="1.8" fill="'+paper+'" stroke="'+deep+'" stroke-width=".9"/>'
          +'</svg>',
        href='data:image/svg+xml,'+encodeURIComponent(svg),
        link=document.querySelector('link[rel="icon"]');
    if(!link){ link=document.createElement('link'); link.setAttribute('rel','icon'); document.head.appendChild(link); }
    link.setAttribute('type','image/svg+xml'); link.setAttribute('href',href);
  }
  try{ paint(); }catch(e){}
  // accent 變更即時重繪(設定面板 twSetAccent 於主引擎載入後才有);讓 live favicon 與匯出同步
  window.addEventListener('load',function(){ try{
    if(typeof window.twSetAccent==='function' && !window.__twFaviconHook){
      window.__twFaviconHook=true; var orig=window.twSetAccent;
      window.twSetAccent=function(){ var r=orig.apply(this,arguments); try{ paint(); }catch(e){} return r; };
    }
    paint();
  }catch(e){} });
})();
</script>
</head>
<body>載入風格中…</body>
</html>
